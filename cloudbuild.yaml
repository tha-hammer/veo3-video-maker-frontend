steps:
  # Install dependencies
  - name: 'node:16'
    entrypoint: npm
    args: ['install']

  # Run tests (if they exist)
  - name: 'node:16'
    entrypoint: npm
    args: ['test', '--if-present']

  # Build
  - name: 'node:16'
    entrypoint: npm
    args: ['run', 'build']

  # Deploy to Cloud Storage
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', 'dist/', 'gs://${_FRONTEND_BUCKET}/']

  # Set Cache-Control headers for all files
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'setmeta', '-h', 'Cache-Control:public, max-age=3600', 'gs://${_FRONTEND_BUCKET}/**']

  # Invalidate CDN cache if CDN is enabled
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [[ -n "${_LOAD_BALANCER_NAME}" ]]; then
          gcloud compute url-maps invalidate-cdn-cache ${_LOAD_BALANCER_NAME} \
            --path="/*" \
            --async
        fi

substitutions:
  _FRONTEND_BUCKET: ${PROJECT_ID}-frontend
  _LOAD_BALANCER_NAME: veo3-frontend-lb  # Optional: Remove if not using CDN

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Faster builds

timeout: '900s' 