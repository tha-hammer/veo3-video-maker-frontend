steps:
  # STEP 1: Install Node.js dependencies
  - name: 'node:18'
    id: 'install-dependencies'
    entrypoint: npm
    args: ['install']

  # STEP 2: Build the application
  - name: 'node:18'
    id: 'build-app'
    entrypoint: npm
    args: ['run', 'build']
    env:
      - 'VITE_API_BASE_URL=${_API_GATEWAY_URL}'
    waitFor: ['install-dependencies']

  # STEP 3: Deploy to Cloud Storage only if on the main branch
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-to-gcs'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          echo "INFO: Branch is 'main'. Deploying to Cloud Storage..."
          gsutil -m rsync -d -r dist/ gs://${_STORAGE_BUCKET}
        else
          echo "INFO: Branch is not 'main' ($BRANCH_NAME). Skipping deployment to GCS."
        fi
    waitFor: ['build-app']

  # STEP 4: Invalidate CDN cache only if on the main branch
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'invalidate-cdn'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          echo "INFO: Branch is 'main'. Invalidating CDN cache..."
          gcloud compute url-maps invalidate-cdn-cache ${_CDN_URL_MAP} --path "/*" --async
        else
          echo "INFO: Branch is not 'main' ($BRANCH_NAME). Skipping CDN invalidation."
        fi
    waitFor: ['deploy-to-gcs']

substitutions:
  _STORAGE_BUCKET: 'default-bucket'
  _CDN_URL_MAP: 'default-cdn-map'
  _API_GATEWAY_URL: 'default-api-gateway-url'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
timeout: '900s' 